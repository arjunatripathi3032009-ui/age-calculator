<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator Pro - Final Version</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --input-bg: #0f172a;
            --border-color: #334155;
        }

        .light-theme {
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #0284c7;
            --input-bg: #f8fafc;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        
        body { background: var(--bg-color); color: var(--text-primary); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .theme-switch {
            position: absolute; top: 20px; right: 20px;
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border-color);
            background: var(--container-bg); color: var(--text-primary); cursor: pointer; font-size: 14px;
        }

        .ad-placeholder {
            width: 100%; max-width: 728px; height: 90px;
            background: rgba(128, 128, 128, 0.1); margin: 20px 0;
            display: flex; align-items: center; justify-content: center;
            border: 1px dashed var(--text-secondary); color: var(--text-secondary);
            font-size: 12px; border-radius: 8px;
        }

        .container {
            background: var(--container-bg); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 450px;
            text-align: center; border: 1px solid var(--border-color);
        }

        h1 span { color: var(--accent-color); }
        .input-group { text-align: left; margin: 25px 0; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); }
        
        input[type="date"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border-color);
            background: var(--input-bg); color: var(--text-primary); font-size: 16px; outline: none;
        }

        button.calc-btn {
            width: 100%; padding: 15px; background: var(--accent-color); border: none; border-radius: 8px;
            color: white; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        .result-box {
            margin-top: 25px; padding: 20px; background: var(--input-bg);
            border-radius: 12px; text-align: left; display: none;
        }
        .result-item span { color: var(--accent-color); font-weight: bold; }

        .share-section { margin-top: 20px; display: none; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .share-icons { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .share-btn { font-size: 24px; text-decoration: none; transition: 0.3s; }
        .fa-whatsapp { color: #25d366; }
        .fa-facebook { color: #1877f2; }
        .fa-link { color: var(--text-secondary); cursor: pointer; }

        footer { margin-top: auto; padding: 20px; font-size: 13px; color: var(--text-secondary); text-align: center; }
        footer a { color: var(--accent-color); text-decoration: none; margin: 0 10px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="theme-switch" id="themeBtn" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> Mode
    </button>

    <div class="ad-placeholder">GOOGLE ADSENSE - TOP</div>

    <div class="container">
        <h1>Age <span>Calculator</span></h1>
        <div class="input-group">
            <label>Select Date of Birth:</label>
            <input type="date" id="dob">
        </div>
        <button class="calc-btn" onclick="calculateAge()">Calculate Age</button>

        <div class="result-box" id="result-box">
            <div class="result-item" id="main-age"></div>
            <div style="height:1px; background:var(--border-color); margin:15px 0;"></div>
            <div class="result-item" id="total-days"></div>
            
            <div class="share-section" id="share-box">
                <p style="text-align:center; font-size:12px; color:var(--text-secondary);">Share your result:</p>
                <div class="share-icons">
                    <a href="#" id="wa-share" target="_blank" class="share-btn"><i class="fab fa-whatsapp"></i></a>
                    <a href="#" id="fb-share" target="_blank" class="share-btn"><i class="fab fa-facebook-f"></i></a>
                    <i class="fas fa-link share-btn" onclick="copyLink()"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="ad-placeholder">GOOGLE ADSENSE - BOTTOM</div>

    <footer>
        <p>&copy; 2026 Age Calculator Pro</p>
        <a onclick="alert('Terms')">Terms</a> | <a onclick="alert('Privacy')">Privacy</a>
    </footer>

    <script>
        const dateInput = document.getElementById("dob");
        dateInput.max = new Date().toISOString().split("T")[0];

        function toggleTheme() { 
            document.body.classList.toggle("light-theme"); 
            const themeIcon = document.querySelector("#themeBtn i");
            if(document.body.classList.contains("light-theme")) {
                themeIcon.className = "fas fa-sun";
            } else {
                themeIcon.className = "fas fa-moon";
            }
        }

        function calculateAge() {
            const dobValue = dateInput.value;
            if (!dobValue) return alert("Please select a date!");

            const birthDate = new Date(dobValue);
            const today = new Date();

            let y = today.getFullYear() - birthDate.getFullYear();
            let m = today.getMonth() - birthDate.getMonth();
            let d = today.getDate() - birthDate.getDate();

            if (d < 0) { m--; d += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (m < 0) { y--; m += 12; }

            const totalDays = Math.floor(Math.abs(today - birthDate) / (1000 * 60 * 60 * 24));
            
            document.getElementById("result-box").style.display = "block";
            document.getElementById("share-box").style.display = "block";
            document.getElementById("main-age").innerHTML = `Age: <span>${y}</span> Years, <span>${m}</span> Months, <span>${d}</span> Days`;
            document.getElementById("total-days").innerHTML = `Total Days: <span>${totalDays.toLocaleString()}</span>`;

            const shareText = `I am ${y} years old! Check yours: ${window.location.href}`;
            document.getElementById("wa-share").href = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
            document.getElementById("fb-share").href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`;
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied!");
        }
    </script>
</body>
</html>
